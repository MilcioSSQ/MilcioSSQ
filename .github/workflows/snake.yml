name: Generate Snake Animation

on:
  # jeden Tag um Mitternacht automatisch
  schedule:
    - cron: "0 0 * * *"
  # manueller Start ueber den Actions-Tab
  workflow_dispatch:
  # bei jedem Push auf main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Snake-SVGs erzeugen (hell + dunkel)
        uses: Platane/snk/svg-only@v3
        with:
          # dein GitHub-Username
          github_user_name: MilcioSSQ
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: In den "output"-Branch pushen
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          # automatischer Token - KEIN eigener PAT noetig
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
